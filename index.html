<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Nutri IA</title>
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkNvYWNoIE51dHJpdGlvbiBJQSIsCiAgInNob3J0X25hbWUiOiAiTnV0cmlJQSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjhmYmZmIiwKICAidGhlbWVfY29sb3IiOiAiIzIyYzU1ZSIKfQ==">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, sans-serif; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1.5rem; margin-bottom: 1.5rem; }
        input { background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.75rem; border-radius: 0.75rem; width: 100%; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen pb-10">

    <header class="bg-green-600 text-white p-6 rounded-b-[2.5rem] shadow-lg mb-6">
        <h1 class="text-2xl font-bold text-center">Mon Coach Perso 🍏</h1>
    </header>

    <main class="max-w-md mx-auto px-4">
        
        <section class="card border-t-4 border-green-500">
            <h2 class="font-bold text-xl mb-4">🔧 Calculateur</h2>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="age" placeholder="Âge">
                    <select id="sexe" class="p-3 bg-slate-50 border rounded-xl"><option value="homme">Homme</option><option value="femme">Femme</option></select>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="poids_init" placeholder="Poids (kg)">
                    <input type="number" id="taille" placeholder="Taille (cm)">
                </div>
                <button onclick="calculerBesoins()" class="w-full bg-green-600 text-white font-bold py-3 rounded-xl">Calculer</button>
            </div>
            <div id="resultats" class="hidden mt-4 p-4 bg-green-50 rounded-xl border border-green-100">
                <p class="text-sm">Objectif : <span id="target-val" class="text-xl font-bold text-green-700">--</span> kcal / jour</p>
            </div>
        </section>

        <section class="card border-t-4 border-blue-500">
            <h2 class="font-bold text-xl mb-4">⚖️ Suivi du Poids</h2>
            <div class="flex gap-2 mb-4">
                <input type="number" id="poids_jour" step="0.1" placeholder="Poids d'aujourd'hui">
                <button onclick="savePoids()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">OK</button>
            </div>
            <div id="historique" class="space-y-2 text-sm text-slate-600">
                </div>
        </section>

        <section class="card border-t-4 border-orange-500">
            <h2 class="font-bold mb-3">📸 Journal Repas</h2>
            <textarea id="mealInput" class="w-full p-3 border rounded-xl mb-3" rows="2" placeholder="Ex: 2 oeufs, 1 avocat..."></textarea>
            <button class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold">Analyser avec l'IA</button>
        </section>

    </main>

    <script>
        function calculerBesoins() {
            const age = parseFloat(document.getElementById('age').value);
            const poids = parseFloat(document.getElementById('poids_init').value);
            const taille = parseFloat(document.getElementById('taille').value);
            const sexe = document.getElementById('sexe').value;
            let bmr = (sexe === "homme") ? (10 * poids + 6.25 * taille - 5 * age + 5) : (10 * poids + 6.25 * taille - 5 * age - 161);
            document.getElementById('target-val').innerText = Math.round(bmr * 1.3 - 500);
            document.getElementById('resultats').classList.remove('hidden');
        }

        function savePoids() {
            const p = document.getElementById('poids_jour').value;
            if(!p) return;
            const date = new Date().toLocaleDateString('fr-FR');
            let data = JSON.parse(localStorage.getItem('suiviPoids') || '[]');
            data.unshift({date, p}); // Ajoute au début
            localStorage.setItem('suiviPoids', JSON.stringify(data.slice(0, 5))); // Garde les 5 derniers
            displayPoids();
        }

        function displayPoids() {
            let data = JSON.parse(localStorage.getItem('suiviPoids') || '[]');
            const div = document.getElementById('historique');
            div.innerHTML = data.map(i => `<div class="flex justify-between border-b pb-1"><span>${i.date}</span><b>${i.p} kg</b></div>`).join('');
        }

        // Charger l'historique au démarrage
        displayPoids();
    </script>
</body>
</html>
