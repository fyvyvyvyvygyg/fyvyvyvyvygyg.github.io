<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #111111; color: #FFFFFF; padding-bottom: 120px; }
        .carbon-card { background-color: #1A1A1A; border-radius: 28px; border: 1px solid #2A2A2A; padding: 22px; margin-bottom: 18px; position: relative; }
        .progress-bg { background-color: #000000; border-radius: 20px; height: 12px; overflow: hidden; border: 1px solid #2A2A2A; }
        .progress-fill { background: linear-gradient(90deg, #FF6600, #FF9933); height: 100%; transition: width 0.4s ease; width: 0%; box-shadow: 0 0 10px rgba(255, 102, 0, 0.5); }
        .app-icon { width: 42px; height: 42px; border-radius: 10px; background-color: #2A2A2A; object-fit: cover; }
        .app-icon-nav { width: 28px; height: 28px; object-fit: cover; border-radius: 6px; margin-bottom: 4px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; color: #666; transition: 0.2s; }
        .nav-item.active { color: #FF6600; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        canvas { max-width: 100% !important; height: 200px !important; }
    </style>
</head>
<body>

    <main class="max-w-md mx-auto px-5 pt-8">

        <div id="page-home" class="page active">
            <header class="flex justify-between items-center mb-7">
                <h1 class="text-3xl font-black text-white tracking-tighter">Mon Journal</h1>
                <div class="flex items-center gap-3">
                    <span id="db-status" class="w-2 h-2 rounded-full bg-red-500"></span>
                    <img src="icons/15bf0cf913f456749b8ecff6fd1f935b.jpg" class="app-icon">
                </div>
            </header>
            <section class="carbon-card">
                <div class="flex justify-between items-start mb-3">
                    <div><p class="text-[#A0A0A0] text-[10px] font-extrabold uppercase">Restant</p><h2 class="text-5xl font-black" id="cal-remaining">2000</h2></div>
                    <div class="text-right"><p class="text-[10px] text-[#A0A0A0] font-bold uppercase">Objectif</p><p class="text-xl font-extrabold text-[#FF6600]">2000 kcal</p></div>
                </div>
                <div class="progress-bg"><div id="progress-bar" class="progress-fill"></div></div>
            </section>
            <div id="foodList" class="space-y-3 mt-5">
                <p class="text-center text-[#444] text-sm">Chargement des données...</p>
            </div>
        </div>

        <div id="page-stats" class="page">
            <header class="mb-7">
                <h1 class="text-3xl font-black text-white tracking-tighter">Dashboard</h1>
                <p class="text-[#A0A0A0] text-sm">Analyse de tes 7 derniers jours</p>
            </header>

            <section class="carbon-card">
                <h3 class="text-xs font-black text-[#FF6600] uppercase mb-4 tracking-widest">Consommation Calorique</h3>
                <canvas id="caloriesChart"></canvas>
            </section>

            <div class="grid grid-cols-2 gap-4">
                <div class="carbon-card text-center">
                    <p class="text-[10px] text-[#A0A0A0] font-bold uppercase">Moyenne</p>
                    <p class="text-2xl font-black text-white">1,840</p>
                    <p class="text-[10px] text-green-500">Kcal / jour</p>
                </div>
                <div class="carbon-card text-center">
                    <p class="text-[10px] text-[#A0A0A0] font-bold uppercase">Poids moyen</p>
                    <p class="text-2xl font-black text-white">74.2</p>
                    <p class="text-[10px] text-[#FF6600]">kg</p>
                </div>
            </div>
        </div>

        <div id="page-profile" class="page">
             <header class="mb-8 flex items-center gap-4">
                <img src="icons/Eaf50fa63a8bdec5fb5957241b67fe7d.jpg" alt="Profil" class="app-icon">
                <h1 class="text-3xl font-black text-white tracking-tighter">Profil</h1>
            </header>
            <section class="carbon-card">
                <p class="text-center text-[#A0A0A0]">Connecté avec succès à Supabase</p>
            </section>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#2A2A2A] px-6 py-4 flex justify-between items-center z-50">
        <div class="nav-item active" onclick="showPage('home', event)">
            <img src="icons/15bf0cf913f456749b8ecff6fd1f935b.jpg" class="app-icon-nav">
            <span class="text-[10px] font-bold uppercase">Journal</span>
        </div>
        <div class="nav-item" onclick="showPage('stats', event)">
            <div class="w-[28px] h-[28px] bg-[#2A2A2A] rounded flex items-center justify-center mb-1">
                <span class="text-xs">📊</span>
            </div>
            <span class="text-[10px] font-bold uppercase">Stats</span>
        </div>
        <div class="nav-item" onclick="showPage('profile', event)">
            <img src="icons/Eaf50fa63a8bdec5fb5957241b67fe7d.jpg" class="app-icon-nav">
            <span class="text-[10px] font-bold uppercase">Profil</span>
        </div>
    </nav>

    <script>
        // CONFIGURATION SUPABASE
        const SUPABASE_URL = 'https://myzwfbfkkeatamxbunci.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_C1m51eJUVv2U079zIE_MWw_1x7i5dcF';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Vérifier la connexion
        async function checkSupabase() {
            try {
                const { data, error } = await supabaseClient.from('repas').select('*').limit(1);
                document.getElementById('db-status').classList.replace('bg-red-500', 'bg-green-500');
                document.getElementById('foodList').innerHTML = '<p class="text-center text-[#444] text-sm">Prêt à enregistrer tes repas.</p>';
            } catch (e) {
                console.log("En attente de création de table");
            }
        }
        checkSupabase();

        function showPage(pageId, event) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
            
            if(pageId === 'stats') { initChart(); }
        }

        function initChart() {
            const ctx = document.getElementById('caloriesChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam', 'Dim'],
                    datasets: [{
                        label: 'Calories',
                        data: [1900, 2100, 1850, 2200, 1700, 2300, 1950],
                        borderColor: '#FF6600',
                        backgroundColor: 'rgba(255, 102, 0, 0.1)',
                        fill: true,
                        tension: 0.4,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { display: false },
                        x: { grid: { display: false }, ticks: { color: '#666', font: { size: 10 } } }
                    }
                }
            });
        }
    </script>
</body>
</html>
