<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Clone IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FA; }
        .carbon-card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); padding: 20px; margin-bottom: 20px; }
        .progress-bg { background: #E2E8F0; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #3B82F6, #2563EB); height: 100%; transition: width 0.5s ease; width: 0%; }
        input, select { border: 1px solid #E2E8F0; border-radius: 12px; padding: 12px; font-size: 16px; width: 100%; background: #fcfcfc; }
        label { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; margin-left: 4px; }
    </style>
</head>
<body class="pb-24">

    <nav class="p-6 flex justify-between items-center">
        <div>
            <p class="text-slate-500 text-sm">Tableau de bord</p>
            <h1 class="text-2xl font-extrabold text-slate-800">Mon Coach IA 🍏</h1>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-6">

        <section class="carbon-card border-t-4 border-blue-500">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">Restant</p>
                    <h2 class="text-4xl font-black text-slate-900" id="cal-remaining">--</h2>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-400">Objectif: <span id="cal-target">--</span></p>
                </div>
            </div>
            <div class="progress-bg mb-6">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
        </section>

        <section class="carbon-card">
            <h3 class="font-bold text-lg mb-4 text-slate-800">⚙️ Ton Profil</h3>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>Âge</label>
                        <input type="number" id="age" placeholder="Ex: 25">
                    </div>
                    <div>
                        <label>Sexe</label>
                        <select id="sexe">
                            <option value="homme">Homme</option>
                            <option value="femme">Femme</option>
                        </select>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label>Poids (kg)</label>
                        <input type="number" id="poids" placeholder="75">
                    </div>
                    <div>
                        <label>Taille (cm)</label>
                        <input type="number" id="taille" placeholder="180">
                    </div>
                </div>
                <div>
                    <label>Activité</label>
                    <select id="activite">
                        <option value="1.2">Sédentaire</option>
                        <option value="1.375">Léger (1-2x/sem)</option>
                        <option value="1.55">Modéré (3-4x/sem)</option>
                        <option value="1.725">Intense (6x/sem)</option>
                    </select>
                </div>
                <div>
                    <label>Objectif</label>
                    <select id="obj">
                        <option value="-500">Perte de poids</option>
                        <option value="0">Maintien</option>
                        <option value="300">Prise de masse</option>
                    </select>
                </div>
                <button onclick="updateCoach()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all mt-2">
                    Calculer mon plan Carbon
                </button>
            </div>
        </section>

        <section class="carbon-card border-l-4 border-orange-400">
            <h3 class="font-bold mb-3">🍽️ Enregistrer un repas</h3>
            <div class="space-y-3">
                <input type="text" id="mealDesc" placeholder="Ex: Poulet, riz, brocolis...">
                <button onclick="logMeal()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold">Ajouter au journal</button>
            </div>
        </section>

    </main>

    <script>
        let targetCal = 0;
        let consumedCal = 0;

        function updateCoach() {
            const age = parseFloat(document.getElementById('age').value);
            const poids = parseFloat(document.getElementById('poids').value);
            const taille = parseFloat(document.getElementById('taille').value);
            const sexe = document.getElementById('sexe').value;
            const activite = parseFloat(document.getElementById('activite').value);
            const objectif = parseFloat(document.getElementById('obj').value);

            if(!age || !poids || !taille) return alert("Complète toutes les cases !");

            // Formule Mifflin-St Jeor exacte
            let bmr = (10 * poids) + (6.25 * taille) - (5 * age);
            bmr = (sexe === "homme") ? bmr + 5 : bmr - 161;
            
            targetCal = Math.round((bmr * activite) + objectif);
            
            document.getElementById('cal-target').innerText = targetCal;
            updateUI();
        }

        function logMeal() {
            if(targetCal === 0) return alert("Calcule d'abord ton profil !");
            // Pour l'instant on simule 400 calories par repas
            consumedCal += 400; 
            updateUI();
            document.getElementById('mealDesc').value = "";
        }

        function updateUI() {
            let remaining = targetCal - consumedCal;
            document.getElementById('cal-remaining').innerText = remaining;
            
            let percent = (consumedCal / targetCal) * 100;
            document.getElementById('progress-bar').style.width = (percent > 100 ? 100 : percent) + "%";
        }
    </script>
</body>
</html>
