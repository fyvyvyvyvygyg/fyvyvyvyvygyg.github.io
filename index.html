<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Clone Dark Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- Base Styles (Inspirés de l'image & Style Dark/Orange) --- */
        body { font-family: 'Inter', sans-serif; background-color: #111111; color: #FFFFFF; padding-bottom: 120px; }
        
        /* Cartes - Fond sombre, bords très arrondis */
        .carbon-card { background-color: #1A1A1A; border-radius: 28px; border: 1px solid #2A2A2A; padding: 22px; margin-bottom: 18px; position: relative; }
        
        /* Barre de Progression - Fond noir, Remplissage Orange Néon */
        .progress-bg { background-color: #000000; border-radius: 20px; height: 12px; overflow: hidden; border: 1px solid #2A2A2A; }
        .progress-fill { background: linear-gradient(90deg, #FF6600, #FF9933); height: 100%; transition: width 0.4s ease; width: 0%; box-shadow: 0 0 10px rgba(255, 102, 0, 0.5); }
        
        /* Inputs & Selects - Super Dark, Texte blanc, Bords arrondis */
        input, select { border: 1px solid #2A2A2A; border-radius: 14px; padding: 14px; background-color: #080808; color: #FFFFFF; font-size: 16px; width: 100%; transition: border-color 0.2s; }
        input:focus, select:focus { border-color: #FF6600; outline: none; }
        
        /* Labels - Texte gris clair, majuscules */
        label { font-size: 11px; font-weight: 800; color: #A0A0A0; text-transform: uppercase; margin-left: 6px; margin-bottom: 5px; display: block; tracking-widest; }
        
        /* --- Styles des Icônes Professionnelles (Nouvelles) --- */
        .app-icon { width: 42px; height: 42px; border-radius: 10px; background-color: #2A2A2A; object-fit: contain; padding: 6px; transition: transform 0.2s; }
        .nav-item:active .app-icon, .btn-primary:active .app-icon-btn { transform: scale(0.92); }
        .app-icon-nav { width: 32px; height: 32px; background-color: transparent; } /* Plus petit pour la nav bar */
        .app-icon-btn { width: 24px; height: 24px; background-color: transparent; margin-right: 8px; }

        /* Navigation Basse - Dark, Icônes Orange Professionnelles */
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #666666; font-weight: 700; cursor: pointer; text-transform: uppercase; tracking-wider; transition: color 0.2s; }
        .nav-item.active { color: #FF6600; }
        .nav-icon-wrapper { position: relative; margin-bottom: 4px; }

        /* Boutons - Fond noir, Texte Orange Néon */
        .btn-primary { width: 100%; background-color: #000000; color: #FF6600; font-weight: 800; font-size: 15px; text-transform: uppercase; tracking-wider; py: 4; rounded-2xl; border: 2px solid #FF6600; transition: all 0.2s; box-shadow: 0 0 15px rgba(255, 102, 0, 0.2); display: flex; align-items: center; justify-content: center; }
        .btn-primary:active { transform: scale(0.97); box-shadow: 0 0 5px rgba(255, 102, 0, 0.5); }
        
        /* Structure des pages */
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Styles spécifiques des macros */
        .macro-box { background-color: #080808; border: 1px solid #2A2A2A; border-radius: 16px; padding: 10px; text-center: center; position: relative; }
        .macro-icon-overlay { position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; opacity: 0.5; }
    </style>
</head>
<body>

    <main class="max-w-md mx-auto px-5 pt-8">

        <div id="page-home" class="page active">
            <header class="flex justify-between items-center mb-7 relative">
                <h1 class="text-3xl font-black text-white tracking-tighter">Mon Journal</h1>
                <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=🎯" alt="Plan" class="app-icon absolute -top-2 right-12">
                <div class="bg-black text-[#FF6600] px-4 py-1.5 rounded-full text-xs font-bold border border-[#FF6600]" id="status-plan">PLAN CARB</div>
            </header>

            <section class="carbon-card">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <p class="text-[#A0A0A0] text-[10px] font-extrabold uppercase tracking-widest">Restant</p>
                        <h2 class="text-5xl font-black text-white tracking-tighter" id="cal-remaining">--</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Objectif</p>
                        <p class="text-xl font-extrabold text-[#FF6600]" id="cal-target-label">--</p>
                    </div>
                </div>
                <div class="progress-bg mb-7">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
                
                <div class="grid grid-cols-3 gap-3">
                    <div class="macro-box">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Prot (g)</p>
                        <p class="font-extrabold text-lg text-white" id="p-val">0</p>
                        <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=🍎" alt="Prot" class="macro-icon-overlay app-icon">
                    </div>
                    <div class="macro-box">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Gluc (g)</p>
                        <p class="font-extrabold text-lg text-white" id="g-val">0</p>
                        <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=💧" alt="Gluc" class="macro-icon-overlay app-icon">
                    </div>
                    <div class="macro-box">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Lip (g)</p>
                        <p class="font-extrabold text-lg text-white" id="l-val">0</p>
                        <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=🔥" alt="Lip" class="macro-icon-overlay app-icon">
                    </div>
                </div>
            </section>

            <section class="carbon-card">
                <h3 class="font-bold text-sm mb-4 text-[#A0A0A0] uppercase tracking-wider flex items-center gap-2">
                    <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=🍎" alt="Ajout" class="app-icon">
                    Ajouter un aliment
                </h3>
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <input type="text" id="foodName" class="flex-[2.5]" placeholder="Ex: Poulet">
                        <input type="number" id="foodWeight" class="flex-1" placeholder="g">
                    </div>
                    <button onclick="addFood()" class="btn-primary py-4 rounded-2xl">
                        <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=＋" alt="Plus" class="app-icon app-icon-btn">
                        Enregistrer
                    </button>
                </div>
            </section>

            <div id="foodList" class="space-y-3"></div>
        </div>

        <div id="page-profile" class="page">
            <header class="mb-8 flex items-center gap-4">
                <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=👤" alt="Profil Title" class="app-icon">
                <div>
                    <h1 class="text-3xl font-black text-white tracking-tighter">Profil</h1>
                    <p class="text-[#A0A0A0] text-sm mt-1">Configure ton coach IA</p>
                </div>
            </header>

            <section class="carbon-card">
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>Âge</label>
                            <input type="number" id="age" placeholder="25">
                        </div>
                        <div>
                            <label>Sexe</label>
                            <select id="sexe">
                                <option value="homme">Homme</option>
                                <option value="femme">Femme</option>
                            </select>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label>Poids (kg)</label>
                            <input type="number" id="poids" placeholder="75">
                        </div>
                        <div>
                            <label>Taille (cm)</label>
                            <input type="number" id="taille" placeholder="180">
                        </div>
                    </div>
                    <div>
                        <label>Objectif</label>
                        <select id="obj">
                            <option value="-500">Perte de poids</option>
                            <option value="0">Maintien (Équilibre)</option>
                            <option value="300">Prise de masse</option>
                        </select>
                    </div>
                    <button onclick="updateCoach()" class="btn-primary py-4 rounded-2xl mt-3">
                        <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=💾" alt="Sauver" class="app-icon app-icon-btn">
                        Sauvegarder
                    </button>
                </div>
            </section>
        </div>

    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#2A2A2A] px-10 py-5 flex justify-between items-center z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
        
        <div class="nav-item active" onclick="showPage('home')">
            <div class="nav-icon-wrapper">
                <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=🏠" alt="Journal Icon" class="app-icon app-icon-nav">
            </div>
            <span>Journal</span>
        </div>
        
        <div class="nav-item" onclick="showPage('profile')">
            <div class="nav-icon-wrapper">
                <img src="https://via.placeholder.com/48/2A2A2A/FF6600?text=👤" alt="Profil Icon" class="app-icon app-icon-nav">
            </div>
            <span>Profil</span>
        </div>
    </nav>

    <script>
        // Logique de fonctionnalité (Inchassée)
        let targetCal = 2000;
        let consumedCal = 0;

        // Fonction pour changer d'onglet
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // Fonction pour calculer le plan (Identique)
        function updateCoach() {
            const age = parseFloat(document.getElementById('age').value);
            const p = parseFloat(document.getElementById('poids').value);
            const t = document.getElementById('taille').value;
            const obj = parseFloat(document.getElementById('obj').value);

            if(!age || !p || !t) return alert("Remplis tout ton profil !");

            // Calcul (Mifflin-St Jeor)
            targetCal = Math.round((10 * p) + (6.25 * t) - (5 * age) + 5 + obj);
            
            document.getElementById('cal-target-label').innerText = targetCal + " kcal";
            updateUI();
            showPage('home'); // Retour automatique
            
            // Simulation macros
            document.getElementById('p-val').innerText = Math.round(p * 1.8) + "g";
            document.getElementById('g-val').innerText = Math.round(p * 3) + "g";
            document.getElementById('l-val').innerText = Math.round(p * 0.8) + "g";
        }

        // Fonction pour ajouter un aliment (Identique)
        function addFood() {
            const name = document.getElementById('foodName').value;
            const weight = parseFloat(document.getElementById('foodWeight').value);
            if(!name || !weight) return;

            const cal = Math.round(weight * 1.5); // Simulation
            consumedCal += cal;
            
            const list = document.getElementById('foodList');
            // Nouveau style d'item de liste (Dark) - Garder les emojis pour la liste
            const item = `<div class="bg-[#1A1A1A] border border-[#2A2A2A] p-5 rounded-2xl flex justify-between items-center shadow-inner">
                <div><p class="font-bold text-white text-lg tracking-tight">${name}</p><p class="text-xs text-[#A0A0A0]">${weight}g</p></div>
                <span class="font-black text-[#FF6600] text-xl">+${cal} kcal</span>
            </div>`;
            list.insertAdjacentHTML('afterbegin', item);
            updateUI();
            document.getElementById('foodName').value = "";
            document.getElementById('foodWeight').value = "";
        }

        // Fonction pour mettre à jour l'interface (Identique)
        function updateUI() {
            let remain = targetCal - consumedCal;
            document.getElementById('cal-remaining').innerText = remain;
            let percent = (consumedCal / targetCal) * 100;
            document.getElementById('progress-bar').style.width = (percent > 100 ? 100 : percent) + "%";
        }
    </script>
</body>
</html>
