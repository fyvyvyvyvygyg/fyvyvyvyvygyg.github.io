<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Clone IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F4F7FA; }
        .carbon-card { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); padding: 20px; }
        .progress-bg { background: #E2E8F0; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #3B82F6, #2563EB); height: 100%; transition: width 0.5s ease; }
        input, select { border: 1px solid #E2E8F0; border-radius: 12px; padding: 12px; font-size: 16px; width: 100%; }
    </style>
</head>
<body class="pb-20">

    <nav class="p-6 flex justify-between items-center">
        <div>
            <p class="text-slate-500 text-sm">Bonjour 👋</p>
            <h1 class="text-2xl font-extrabold text-slate-800">Mon Coach</h1>
        </div>
        <div class="bg-blue-100 p-2 rounded-full text-blue-600">📊</div>
    </nav>

    <main class="max-w-md mx-auto px-6 space-y-6">

        <section class="carbon-card">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <p class="text-slate-500 text-xs uppercase font-bold tracking-wider">Calories Restantes</p>
                    <h2 class="text-4xl font-black text-slate-900" id="cal-remaining">2000</h2>
                </div>
                <div class="text-right">
                    <p class="text-xs text-slate-400">Objectif: <span id="cal-target">2000</span></p>
                </div>
            </div>
            <div class="progress-bg mb-6">
                <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>

            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <p class="text-[10px] font-bold text-orange-500 uppercase">Prot (g)</p>
                    <p id="prot-val" class="font-bold">0 / 150</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-blue-500 uppercase">Gluc (g)</p>
                    <p id="gluc-val" class="font-bold">0 / 200</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold text-yellow-500 uppercase">Lip (g)</p>
                    <p id="lip-val" class="font-bold">0 / 60</p>
                </div>
            </div>
        </section>

        <section class="carbon-card">
            <h3 class="font-bold text-lg mb-4 text-slate-800 italic">Paramétrage du Coach</h3>
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="poids" placeholder="Poids (kg)">
                    <input type="number" id="taille" placeholder="Taille (cm)">
                </div>
                <select id="obj" class="bg-white">
                    <option value="perte">Perte de poids (-500 cal)</option>
                    <option value="maintien">Maintien (Équilibre)</option>
                    <option value="prise">Prise de masse (+300 cal)</option>
                </select>
                <button onclick="updateCoach()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">
                    Mettre à jour mon plan
                </button>
            </div>
        </section>

        <section class="carbon-card border-l-4 border-blue-500">
            <h3 class="font-bold mb-3">⚡ Enregistrer un repas</h3>
            <div class="flex gap-2">
                <input type="text" id="mealDesc" placeholder="Ex: 150g de Poulet, Riz...">
                <button onclick="logMeal()" class="bg-blue-600 text-white px-6 rounded-xl font-bold">Log</button>
            </div>
        </section>

    </main>

    <script>
        let targetCal = 2000;
        let consumedCal = 0;

        function updateCoach() {
            const p = document.getElementById('poids').value;
            const t = document.getElementById('taille').value;
            const obj = document.getElementById('obj').value;

            if(!p || !t) return alert("Remplis ton profil !");

            // Calcul simplifié pour le clone
            targetCal = (10 * p) + (6.25 * t) - 150; 
            if(obj === 'perte') targetCal -= 500;
            if(obj === 'prise') targetCal += 300;

            targetCal = Math.round(targetCal);
            document.getElementById('cal-target').innerText = targetCal;
            document.getElementById('cal-remaining').innerText = targetCal - consumedCal;
            
            // Mise à jour des macros fictives
            document.getElementById('prot-val').innerText = `0 / ${Math.round(p * 2)}`;
            document.getElementById('gluc-val').innerText = `0 / ${Math.round(p * 3)}`;
            document.getElementById('lip-val').innerText = `0 / ${Math.round(p * 0.8)}`;
        }

        function logMeal() {
            // Simulation d'ajout de calories (On ajoutera l'IA après)
            let add = 450; 
            consumedCal += add;
            let remaining = targetCal - consumedCal;
            document.getElementById('cal-remaining').innerText = remaining < 0 ? 0 : remaining;
            
            let percent = (consumedCal / targetCal) * 100;
            document.getElementById('progress-bar').style.width = (percent > 100 ? 100 : percent) + "%";
            
            document.getElementById('mealDesc').value = "";
        }
    </script>
</body>
</html>
