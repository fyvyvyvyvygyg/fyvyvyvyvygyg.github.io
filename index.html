<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbonapp - Mon Dashboard Écolo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; color: var(--dark); }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background-color: #27ae60; }
        #result { margin-top: 25px; padding: 20px; border-radius: 8px; text-align: center; font-size: 1.2em; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 Carbonapp</h1>
    
    <div style="text-align: right; font-size: 0.8em; margin-bottom: 10px;">
        <span id="conn-status" class="status-dot" style="background-color: #e74c3c;"></span>
        <span id="conn-text">Déconnecté</span>
    </div>

    <div class="input-group">
        <label for="transport">Transport (km en voiture) :</label>
        <input type="number" id="transport" placeholder="Ex: 50">
    </div>

    <div class="input-group">
        <label for="repas">Nombre de repas avec viande :</label>
        <input type="number" id="repas" placeholder="Ex: 2">
    </div>

    <button onclick="calculerEtEnregistrer()">Calculer mon empreinte</button>

    <div id="result"></div>
</div>

<script>
    // Configuration Supabase
    const SUPABASE_URL = 'https://myzwfbfkkeatamxbunci.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_C1m51eJUVv2U079zIE_MWw_1x7i5dcF';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Vérification de la connexion au démarrage
    async function checkStatus() {
        const { data, error } = await supabase.from('logs').select('count', { count: 'exact', head: true });
        if (!error || error.code === 'PGRST116' || error.message.includes('relation "logs" does not exist')) {
            document.getElementById('conn-status').classList.add('online');
            document.getElementById('conn-text').innerText = "Supabase Connecté";
        }
    }
    checkStatus();

    async function calculerEtEnregistrer() {
        const km = document.getElementById('transport').value || 0;
        const repas = document.getElementById('repas').value || 0;
        
        // Calcul simplifié : 0.2kg CO2 par km, 2kg CO2 par repas viande
        const totalCO2 = (km * 0.2) + (repas * 2);
        
        const resultDiv = document.getElementById('result');
        resultDiv.style.display = 'block';
        resultDiv.className = 'success';
        resultDiv.innerHTML = `<strong>Résultat : ${totalCO2.toFixed(2)} kg de CO2</strong><br><small>Données en cours d'envoi...</small>`;

        // Envoi vers Supabase (on créera la table 'logs' juste après)
        const { error } = await supabase
            .from('logs')
            .insert([{ transport_km: km, repas_viande: repas, co2_total: totalCO2 }]);

        if (error && error.message.includes('not found')) {
            resultDiv.innerHTML += "<br>⚠️ Note : Il faut encore créer la table 'logs' sur Supabase.";
        } else if (!error) {
            resultDiv.innerHTML += "<br>✅ Données sauvegardées !";
        }
    }
</script>

</body>
</html>
