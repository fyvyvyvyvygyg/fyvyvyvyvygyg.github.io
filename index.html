<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carbon Clone Dark Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        /* --- Base Styles --- */
        body { font-family: 'Inter', sans-serif; background-color: #111111; color: #FFFFFF; padding-bottom: 120px; }
        .carbon-card { background-color: #1A1A1A; border-radius: 28px; border: 1px solid #2A2A2A; padding: 22px; margin-bottom: 18px; position: relative; }
        .progress-bg { background-color: #000000; border-radius: 20px; height: 12px; overflow: hidden; border: 1px solid #2A2A2A; }
        .progress-fill { background: linear-gradient(90deg, #FF6600, #FF9933); height: 100%; transition: width 0.4s ease; width: 0%; box-shadow: 0 0 10px rgba(255, 102, 0, 0.5); }
        input, select { border: 1px solid #2A2A2A; border-radius: 14px; padding: 14px; background-color: #080808; color: #FFFFFF; font-size: 16px; width: 100%; }
        input:focus, select:focus { border-color: #FF6600; outline: none; }
        label { font-size: 11px; font-weight: 800; color: #A0A0A0; text-transform: uppercase; margin-left: 6px; margin-bottom: 5px; display: block; }
        .app-icon { width: 42px; height: 42px; border-radius: 10px; background-color: #2A2A2A; object-fit: cover; padding: 4px; transition: transform 0.2s; }
        .app-icon-nav { width: 32px; height: 32px; background-color: transparent; }
        .app-icon-btn { width: 24px; height: 24px; background-color: transparent; margin-right: 8px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #666666; font-weight: 700; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { color: #FF6600; }
        .btn-primary { width: 100%; background-color: #000000; color: #FF6600; font-weight: 800; font-size: 15px; text-transform: uppercase; border: 2px solid #FF6600; display: flex; align-items: center; justify-content: center; border-radius: 1rem; padding: 1rem; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .macro-box { background-color: #080808; border: 1px solid #2A2A2A; border-radius: 16px; padding: 10px; text-align: center; position: relative; }
        .macro-icon-overlay { position: absolute; top: 6px; right: 6px; width: 18px; height: 18px; opacity: 0.6; }
    </style>
</head>
<body>

    <main class="max-w-md mx-auto px-5 pt-8">
        <div id="page-home" class="page active">
            <header class="flex justify-between items-center mb-7 relative">
                <h1 class="text-3xl font-black text-white tracking-tighter">Mon Journal</h1>
                <img src="icons/15bf0cf913f456749b8ecff6fd1f935b.jpg" alt="Plan" class="app-icon absolute -top-2 right-12">
                <div class="bg-black text-[#FF6600] px-4 py-1.5 rounded-full text-xs font-bold border border-[#FF6600]" id="status-plan">PLAN CARB</div>
            </header>

            <section class="carbon-card">
                <div class="flex justify-between items-start mb-3">
                    <div>
                        <p class="text-[#A0A0A0] text-[10px] font-extrabold uppercase tracking-widest">Restant</p>
                        <h2 class="text-5xl font-black text-white tracking-tighter" id="cal-remaining">--</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Objectif</p>
                        <p class="text-xl font-extrabold text-[#FF6600]" id="cal-target-label">--</p>
                    </div>
                </div>
                <div class="progress-bg mb-7">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>
                
                <div class="grid grid-cols-3 gap-3">
                    <div class="macro-box">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Prot (g)</p>
                        <p class="font-extrabold text-lg text-white" id="p-val">0</p>
                        <img src="icons/1b4e05fa6d6fd2089664846bd999cb25.jpg" alt="Prot" class="macro-icon-overlay">
                    </div>
                    <div class="macro-box">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Gluc (g)</p>
                        <p class="font-extrabold text-lg text-white" id="g-val">0</p>
                        <img src="icons/2107274bf75cc17d1b2723e569d65ffc.jpg" alt="Gluc" class="macro-icon-overlay">
                    </div>
                    <div class="macro-box">
                        <p class="text-[10px] text-[#A0A0A0] font-bold uppercase tracking-wider">Lip (g)</p>
                        <p class="font-extrabold text-lg text-white" id="l-val">0</p>
                        <img src="icons/7845129a906fe330a6eac0d96b4eea1d.jpg" alt="Lip" class="macro-icon-overlay">
                    </div>
                </div>
            </section>

            <section class="carbon-card">
                <h3 class="font-bold text-sm mb-4 text-[#A0A0A0] uppercase tracking-wider flex items-center gap-2">
                    <img src="icons/807902347bceac247264f99435bd9358.jpg" alt="Ajout" class="app-icon">
                    Ajouter un aliment
                </h3>
                <div class="space-y-4">
                    <div class="flex gap-3">
                        <input type="text" id="foodName" class="flex-[2.5]" placeholder="Ex: Poulet">
                        <input type="number" id="foodWeight" class="flex-1" placeholder="g">
                    </div>
                    <button onclick="addFood()" class="btn-primary">
                        <img src="icons/8dbbcde82d8d35b750bac6725981afd6.jpg" alt="Plus" class="app-icon-btn">
                        Enregistrer
                    </button>
                </div>
            </section>

            <div id="foodList" class="space-y-3"></div>
        </div>

        <div id="page-profile" class="page">
            <header class="mb-8 flex items-center gap-4">
                <img src="icons/bcbf019bf22a88fc9d7e35bd67610289.jpg" alt="Profil" class="app-icon">
                <div>
                    <h1 class="text-3xl font-black text-white tracking-tighter">Profil</h1>
                    <p class="text-[#A0A0A0] text-sm mt-1">Configure ton coach IA</p>
                </div>
            </header>

            <section class="carbon-card">
                <div class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Âge</label><input type="number" id="age" placeholder="25"></div>
                        <div><label>Sexe</label><select id="sexe"><option value="homme">Homme</option><option value="femme">Femme</option></select></div>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label>Poids (kg)</label><input type="number" id="poids" placeholder="75"></div>
                        <div><label>Taille (cm)</label><input type="number" id="taille" placeholder="180"></div>
                    </div>
                    <div>
                        <label>Objectif</label>
                        <select id="obj">
                            <option value="-500">Perte de poids</option>
                            <option value="0">Maintien (Équilibre)</option>
                            <option value="300">Prise de masse</option>
                        </select>
                    </div>
                    <button onclick="updateCoach()" class="btn-primary mt-3">
                        Sauvegarder
                    </button>
                </div>
            </section>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-[#2A2A2A] px-10 py-5 flex justify-between items-center z-50">
        <div class="nav-item active" onclick="showPage('home')">
            <img src="icons/15bf0cf913f456749b8ecff6fd1f935b.jpg" alt="Journal" class="app-icon app-icon-nav">
            <span>Journal</span>
        </div>
        <div class="nav-item" onclick="showPage('profile')">
            <img src="icons/bcbf019bf22a88fc9d7e35bd67610289.jpg" alt="Profil" class="app-icon app-icon-nav">
            <span>Profil</span>
        </div>
    </nav>

            document.getElementById('page-' + pageId).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }
